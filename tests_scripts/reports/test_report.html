<!DOCTYPE html>
<html>
<head>
    <title>Pyodide Integration Test Report</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 5px; }
        .header { border-bottom: 3px solid #0066cc; margin-bottom: 20px; }
        h1 { color: #0066cc; margin: 0; }
        .summary { background: #f9f9f9; padding: 15px; border-radius: 5px; margin: 15px 0; }
        .metric { display: inline-block; margin-right: 30px; }
        .metric label { font-weight: bold; }
        .passed { color: green; font-weight: bold; }
        .failed { color: red; font-weight: bold; }
        .percentage { font-size: 24px; font-weight: bold; color: #0066cc; }
        .footer { margin-top: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Pyodide Integration - Test Report</h1>
        </div>
        
        <div class="summary">
            <h2>Test Results Summary</h2>
            <div class="metric">
                <label>Total Tests:</label> 10
            </div>
            <div class="metric">
                <label>Passed:</label> <span class="passed">5</span>
            </div>
            <div class="metric">
                <label>Failed:</label> <span class="failed">5</span>
            </div>
            <br><br>
            <div class="metric">
                <label>Pass Rate:</label> <span class="percentage">50%</span>
            </div>
            <div class="metric">
                <label>Execution Time:</label> 0.2 seconds
            </div>
        </div>
        
        <div class="footer">
            <p>Generated: 2026-04-09 06:59:48</p>
            <p>Status: <strong>✗ CRITICAL FAILURES</strong></p>
        </div>
    </div>
</body>
</html>
