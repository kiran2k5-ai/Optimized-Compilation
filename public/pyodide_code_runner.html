<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Secure Code Runner - Python & C</title>
    <script async src="https://cdn.jsdelivr.net/pyodide/v0.23.0/full/pyodide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 30px;
        }

        .question-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .question-panel h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.4em;
        }

        .question-panel p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .language-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .language-btn:hover {
            background: #764ba2;
        }

        .language-btn.active {
            background: #764ba2;
            box-shadow: 0 0 10px rgba(118, 75, 162, 0.5);
        }

        .editor-section {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            color: #d4d4d4;
            margin-bottom: 20px;
        }

        .editor-section h3 {
            color: #4ec9b0;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: #252526;
            color: #d4d4d4;
            border: 1px solid #3e3e42;
            border-radius: 5px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
        }

        .test-case-section {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .test-case-section h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .test-case-input {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .test-case-input input,
        .test-case-input textarea {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            height: 40px;
        }

        .test-case-input textarea {
            height: 60px;
        }

        .btn-run {
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
            margin-bottom: 10px;
        }

        .btn-run:hover {
            background: #45a049;
        }

        .btn-add-test {
            background: #2196F3;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-add-test:hover {
            background: #0b7dda;
        }

        .output-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #4caf50;
        }

        .output-panel h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .output-box {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #3e3e42;
            line-height: 1.5;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            padding: 10px;
            font-weight: bold;
        }

        .error {
            color: #ff4444;
        }

        .success {
            color: #44ff44;
        }

        .test-result {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            border-left: 3px solid #667eea;
        }

        .test-result.passed {
            border-left-color: #4caf50;
            background: #e8f5e9;
        }

        .test-result.failed {
            border-left-color: #f44336;
            background: #ffebee;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Secure Code Runner</h1>
            <p>Python Code Execution in Browser Sandbox (Test Cases from Server)</p>
        </div>

        <div class="content">
            <!-- Editor & Test Cases Panel -->
            <div>
                <div class="editor-section">
                    <h3>📝 Code Editor</h3>
                    <textarea id="code-editor" placeholder="Write your code here..."></textarea>
                </div>

                <div class="test-case-section">
                    <h4>🧪 Test Cases (From Server)</h4>
                    
                    <div style="margin-bottom: 10px;">
                        <h5 style="color: #666; margin-bottom: 5px;">📥 Server Test Cases:</h5>
                        <div id="server-tests" style="max-height: 150px; overflow-y: auto; background: white; padding: 8px; border-radius: 5px;"></div>
                    </div>

                    <div style="margin-bottom: 10px;">
                        <h5 style="color: #666; margin-bottom: 5px;">➕ Add Custom Test Case:</h5>
                        <div class="test-case-input">
                            <textarea id="custom-input" placeholder="Input values (one per line)"></textarea>
                            <textarea id="custom-expected" placeholder="Expected output"></textarea>
                        </div>
                        <button class="btn-add-test" onclick="addCustomTest()">+ Add & Save to Server</button>
                    </div>

                    <button class="btn-run" onclick="runCode()">▶️ Run All Tests</button>
                    <button class="btn-add-test" onclick="clearAllTests()" style="background: #f44336; margin-left: 5px;">🗑️ Clear All Tests</button>
                </div>

                <div class="output-panel">
                    <h3>📊 Output & Results</h3>
                    <div class="loading" id="loading">⏳ Running code...</div>
                    <div class="output-box" id="output-box">Ready to run code...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pyodide = null;
        let currentTestCases = [];
        const API_URL = 'http://localhost/test_api.php';

        // Initialize Pyodide
        async function initPyodide() {
            if (pyodide === null) {
                let output = document.getElementById('output-box');
                output.innerHTML = '<span class="success">⏳ Loading Python runtime...</span>';
                pyodide = await loadPyodide();
                output.innerHTML = '<span class="success">✅ Ready!</span>';
            }
        }

        // Fetch all test cases from server on page load
        async function loadAllTestCases() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                
                if (result.status === 'success') {
                    const select = document.getElementById('question-select');
                    select.innerHTML = '<option value="">-- Select a Test Case --</option>';
                    
                    Object.keys(result.data).forEach(key => {
                        const option = document.createElement('option');
                        option.value = key;
                        option.textContent = result.data[key].title;
                        select.appendChild(option);
                    });
                    
                    document.getElementById('output-box').innerHTML = '<span class="success">✅ Test cases loaded from server</span>';
                } else {
                    document.getElementById('output-box').innerHTML = '<span class="error">❌ Failed to load test cases</span>';
                }
            } catch (error) {
                document.getElementById('output-box').innerHTML = '<span class="error">❌ Error: ' + error.message + '</span>';
            }
        }

        // Load specific test case
        async function loadTestCase() {
            const questionId = document.getElementById('question-select').value;
            if (!questionId) return;

            try {
                const response = await fetch(API_URL + '?question_id=' + questionId);
                const result = await response.json();
                
                if (result.status === 'success') {
                    currentTestCases = result.data.tests;
                    document.getElementById('code-editor').value = '';
                    document.getElementById('output-box').innerHTML = '<span class="success">✅ ' + result.data.title + ' loaded (' + currentTestCases.length + ' test cases)</span>';
                } else {
                    document.getElementById('output-box').innerHTML = '<span class="error">❌ Failed to load test case</span>';
                }
            } catch (error) {
                document.getElementById('output-box').innerHTML = '<span class="error">❌ Error: ' + error.message + '</span>';
            }
        }

        function addCustomTest() {
            const input = document.getElementById('custom-input').value;
            const expected = document.getElementById('custom-expected').value;
            
            if (input && expected) {
                currentTestCases.push({ input, expected });
                document.getElementById('custom-input').value = '';
                document.getElementById('custom-expected').value = '';
                alert('✅ Custom test added! Total: ' + currentTestCases.length + ' tests');
            } else {
                alert('❌ Please fill both input and expected output');
            }
        }

        async function runCode() {
            const code = document.getElementById('code-editor').value;
            const output = document.getElementById('output-box');
            const loading = document.getElementById('loading');
            
            if (!code.trim()) {
                output.innerHTML = '<span class="error">❌ Please write some code first!</span>';
                return;
            }

            if (currentTestCases.length === 0) {
                output.innerHTML = '<span class="error">❌ Please select a test case or add custom tests!</span>';
                return;
            }

            await initPyodide();
            loading.style.display = 'block';
            output.innerHTML = '';

            let results = '';
            let passed = 0;

            for (let i = 0; i < currentTestCases.length; i++) {
                const test = currentTestCases[i];
                try {
                    const wrappedCode = `
import sys
from io import StringIO
sys.stdin = StringIO(${JSON.stringify(test.input)})
sys.stdout = StringIO()
${code}
output = sys.stdout.getvalue()
`;
                    pyodide.runPython(wrappedCode);
                    const stdout = pyodide.globals.get('output');

                    const expectedOutput = test.expected.trim();
                    const actualOutput = stdout.trim();
                    const isCorrect = actualOutput === expectedOutput;

                    if (isCorrect) {
                        passed++;
                        results += `
                            <div class="test-result passed">
                                <strong>✅ Test ${i + 1}: PASSED</strong><br>
                                Output: "${actualOutput}"
                            </div>
                        `;
                    } else {
                        results += `
                            <div class="test-result failed">
                                <strong>❌ Test ${i + 1}: FAILED</strong><br>
                                Expected: "${expectedOutput}"<br>
                                Got: "${actualOutput}"
                            </div>
                        `;
                    }
                } catch (error) {
                    results += `
                        <div class="test-result failed">
                            <strong>❌ Test ${i + 1}: ERROR</strong><br>
                            ${error.message}
                        </div>
                    `;
                }
            }

            loading.style.display = 'none';
            output.innerHTML = `
                <div style="margin-bottom: 15px; padding: 10px; background: #e3f2fd; border-radius: 5px;">
                    <strong>Score: ${passed}/${currentTestCases.length} tests passed (${Math.round(passed/currentTestCases.length*100)}%)</strong>
                </div>
                ${results}
            `;
        }

        // Initialize on page load
        window.onload = function() {
            initPyodide();
            loadAllTestCases();
        };
    </script>
</body>
</html>
